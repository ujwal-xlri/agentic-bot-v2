services:
  agentic-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-bot-v2
    ports:
      - "8501:8501"
    volumes:
      - ./pdfs:/app/pdfs
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
      - D:/ollama:/root/.ollama
    env_file:
      - .env
    restart: unless-stopped
    stdin_open: true
    tty: true

